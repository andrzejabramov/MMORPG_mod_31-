{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Подтверждение email{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Подтверждение email</h3>
            </div>
            <div class="card-body">
                <p class="text-center">
                    На адрес <strong>{{ email }}</strong> отправлен код подтверждения.
                    Введите его ниже:
                </p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Подтвердить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
