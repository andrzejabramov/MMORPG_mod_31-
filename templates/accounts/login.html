{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Вход на сайт</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Войти</button>
                    </div>
                </form>
                <hr>
                <p class="text-center">
                    Нет аккаунта? <a href="{% url 'accounts:signup' %}">Зарегистрируйтесь</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
